<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册机 · Web 管理台</title>
  <style>
    /* ============== 设计变量 ============== */
    :root {
      --teal: #0d9488;
      --teal-d: #0f766e;
      --teal-l: #f0fdfa;
      --s50: #f8fafc;
      --s100: #f1f5f9;
      --s200: #e2e8f0;
      --s400: #94a3b8;
      --s500: #64748b;
      --s600: #475569;
      --s700: #334155;
      --s800: #1e293b;
      --s900: #0f172a;
      --red: #e11d48;
      --red-l: #fef2f2;
      --green: #059669;
      --green-l: #ecfdf5;
      --amber: #d97706;
      --amber-l: #fffbeb;
    }

    /* ============== 基础重置 ============== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: "Microsoft YaHei", "PingFang SC", "Segoe UI", sans-serif;
      background: var(--s100);
      color: var(--s700);
      font-size: 14px;
    }

    /* ============== 登录页 ============== */
    .login-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      background: linear-gradient(135deg, var(--s900), var(--s700));
    }

    .login-card {
      background: #fff;
      border-radius: 16px;
      padding: 40px 36px;
      width: 360px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, .2);
    }

    .login-card h1 {
      font-size: 20px;
      color: var(--s800);
      text-align: center;
      margin-bottom: 8px;
    }

    .login-card p {
      text-align: center;
      color: var(--s400);
      font-size: 13px;
      margin-bottom: 24px;
    }

    .login-card input {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--s200);
      border-radius: 8px;
      font-size: 14px;
      margin-bottom: 16px;
      outline: none;
      transition: border-color .15s ease;
    }

    .login-card input:focus { border-color: var(--teal); }

    .login-card button {
      width: 100%;
      padding: 12px;
      background: var(--teal);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: background .15s ease;
    }

    .login-card button:hover { background: var(--teal-d); }

    .login-err {
      color: var(--red);
      font-size: 13px;
      text-align: center;
      margin-top: 8px;
    }

    /* ============== 主应用 ============== */
    .app { display: none; }

    .header {
      background: linear-gradient(90deg, var(--s900), var(--s700));
      color: #fff;
      padding: 16px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header h1 { font-size: 17px; letter-spacing: 1px; }
    .header .info { font-size: 12px; color: var(--s400); }
    .header .info span { color: #fff; font-family: Consolas, monospace; }

    .header button {
      background: rgba(255, 255, 255, .1);
      color: #fff;
      border: 1px solid rgba(255, 255, 255, .2);
      padding: 6px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
    }

    .header button:hover { background: rgba(255, 255, 255, .2); }

    /* ============== 标签栏 ============== */
    .tabs {
      display: flex;
      background: #fff;
      border-bottom: 2px solid var(--s100);
      padding: 0 32px;
    }

    .tab {
      padding: 14px 28px;
      cursor: pointer;
      font-weight: bold;
      font-size: 14px;
      color: var(--s500);
      border-bottom: 3px solid transparent;
      transition: color .15s ease, border-color .15s ease;
    }

    .tab:hover { color: var(--s700); }
    .tab.active { color: var(--teal); border-bottom-color: var(--teal); }

    /* ============== 主体内容 ============== */
    .content {
      max-width: 960px;
      margin: 24px auto;
      padding: 0 24px;
    }

    .panel { display: none; }
    .panel.active { display: block; }

    .card {
      background: #fff;
      border: 1px solid var(--s200);
      border-radius: 12px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .card h2 {
      font-size: 15px;
      color: var(--s800);
      margin-bottom: 16px;
    }

    /* ============== 表单 ============== */
    .fg { margin-bottom: 16px; }

    .fg label {
      display: block;
      font-weight: bold;
      font-size: 13px;
      color: var(--s600);
      margin-bottom: 6px;
    }

    .fg input,
    .fg select,
    .fg textarea {
      width: 100%;
      padding: 10px 14px;
      border: 1.5px solid var(--s200);
      border-radius: 8px;
      font-size: 14px;
      outline: none;
      font-family: inherit;
      transition: border-color .15s ease;
    }

    .fg input:focus,
    .fg select:focus,
    .fg textarea:focus { border-color: var(--teal); }

    .fg textarea {
      min-height: 120px;
      resize: vertical;
      font-family: Consolas, monospace;
    }

    .fg .hint {
      font-size: 12px;
      color: var(--s400);
      margin-top: 4px;
    }

    .fr { display: flex; gap: 16px; }
    .fr .fg { flex: 1; }

    /* ============== 授权类型卡片 ============== */
    .lc {
      display: flex;
      gap: 14px;
      margin-bottom: 16px;
    }

    .lc-card {
      flex: 1;
      border: 2px solid var(--s200);
      border-radius: 12px;
      padding: 16px;
      text-align: center;
      cursor: pointer;
      transition: border-color .15s ease, background .15s ease;
    }

    .lc-card:hover { border-color: var(--s400); }
    .lc-card.sel { border-color: var(--teal); background: var(--teal-l); }
    .lc-card .nm { font-weight: bold; font-size: 15px; color: var(--s700); }
    .lc-card .ds { font-size: 12px; color: var(--s500); margin-top: 4px; }

    /* ============== 按钮 ============== */
    .btn {
      padding: 10px 24px;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background .15s ease;
    }

    .btn-p { background: var(--teal); color: #fff; }
    .btn-p:hover { background: var(--teal-d); }

    .btn-s { background: #fff; color: var(--s600); border: 1.5px solid var(--s200); }
    .btn-s:hover { background: var(--s50); }

    .btn-d { background: #fff; color: var(--red); border: 1.5px solid #fecdd3; }
    .btn-d:hover { background: var(--red-l); }

    .btn-g { background: var(--green); color: #fff; }
    .btn-g:hover { background: #047857; }

    .btn-sm { padding: 6px 14px; font-size: 13px; }

    /* ============== 生成结果区 ============== */
    .rb {
      margin-top: 20px;
      padding: 24px;
      background: var(--teal-l);
      border: 1px solid #99f6e4;
      border-radius: 12px;
      text-align: center;
      display: none;
    }

    .rb .key {
      font-size: 28px;
      font-weight: bold;
      color: var(--teal);
      font-family: Consolas, monospace;
      letter-spacing: 4px;
      margin: 12px 0;
    }

    .rb .inf { font-size: 13px; color: var(--s500); }
    .rb.err { background: var(--red-l); border-color: #fecdd3; }
    .rb.err .key { color: var(--red); }

    /* ============== 表格 ============== */
    table { width: 100%; border-collapse: collapse; }

    th {
      background: var(--s50);
      padding: 10px 12px;
      text-align: left;
      font-size: 13px;
      color: var(--s600);
      border-bottom: 1px solid var(--s200);
    }

    td {
      padding: 10px 12px;
      border-bottom: 1px solid var(--s100);
      font-size: 13px;
    }

    tr:hover td { background: var(--s50); }

    .mono { font-family: Consolas, monospace; }

    /* ============== 标签徽章 ============== */
    .tag {
      display: inline-block;
      padding: 2px 10px;
      border-radius: 12px;
      font-size: 12px;
      font-weight: bold;
    }

    .tag-trial { background: var(--amber-l); color: var(--amber); }
    .tag-standard { background: var(--teal-l); color: var(--teal); }
    .tag-lifetime { background: var(--green-l); color: var(--green); }

    /* ============== 分页 ============== */
    .pager {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 16px;
    }

    .pager .inf { font-size: 13px; color: var(--s500); }

    /* ============== 工具栏 ============== */
    .ab {
      display: flex;
      gap: 10px;
      margin-bottom: 16px;
      align-items: center;
    }

    .ab .sp { flex: 1; }

    /* ============== 验证结果 ============== */
    .vr {
      margin-top: 16px;
      padding: 16px 24px;
      border-radius: 10px;
      text-align: center;
      display: none;
    }

    .vr.ok { background: var(--green-l); border: 1px solid #a7f3d0; }
    .vr.fail { background: var(--red-l); border: 1px solid #fecdd3; }

    .vr .st { font-size: 18px; font-weight: bold; }
    .vr.ok .st { color: var(--green); }
    .vr.fail .st { color: var(--red); }

    .vr .dt { font-size: 13px; color: var(--s500); margin-top: 6px; }
  </style>
</head>
<body>

<!-- ========== 登录页 ========== -->
<div class="login-wrap" id="lp">
  <div class="login-card">
    <h1>注册机 · 管理台</h1>
    <p>海康录像批量下载工具 — 密钥管理系统</p>
    <input type="password" id="lpw" placeholder="管理密码" autofocus>
    <button id="btn-login">登 录</button>
    <div class="login-err" id="le"></div>
  </div>
</div>

<!-- ========== 主应用 ========== -->
<div class="app" id="ap">
  <div class="header">
    <h1>注册机 · Web 管理台</h1>
    <div class="info">
      <span id="si"></span>&nbsp;|&nbsp;<button onclick="doLogout()">退出</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-panel="generate" onclick="sw('generate')">生成注册码</div>
    <div class="tab" data-panel="batch" onclick="sw('batch')">批量生成</div>
    <div class="tab" data-panel="verify" onclick="sw('verify')">验证注册码</div>
    <div class="tab" data-panel="history" onclick="sw('history')">历史记录</div>
  </div>

  <div class="content">

    <!-- ===== 生成注册码 ===== -->
    <div class="panel active" id="p-generate">
      <div class="card">
        <h2>生成注册码</h2>

        <div class="fg">
          <label>机器码</label>
          <input type="text" id="gmc" placeholder="A1B2C3D4E5F67890"
                 maxlength="19" oninput="fmt(this)"
                 style="font-family:Consolas,monospace">
          <div class="hint" id="gmh"></div>
        </div>

        <div class="fg">
          <label>授权类型</label>
          <div class="lc" id="lcs">
            <div class="lc-card" data-t="trial" onclick="sel(this)">
              <div class="nm">试用版</div>
              <div class="ds">7天有效期</div>
            </div>
            <div class="lc-card sel" data-t="standard" onclick="sel(this)">
              <div class="nm">标准版</div>
              <div class="ds">1年有效期（365天）</div>
            </div>
            <div class="lc-card" data-t="lifetime" onclick="sel(this)">
              <div class="nm">终身版</div>
              <div class="ds">永不过期</div>
            </div>
          </div>
        </div>

        <div class="fg" id="cex" style="display:none">
          <label>自定义过期日期</label>
          <input type="date" id="gex" min="">
        </div>

        <div class="fg">
          <label>备注（使用者）</label>
          <input type="text" id="grmk" placeholder="例如：张三-财务部">
        </div>

        <button class="btn btn-p" onclick="doGen()">生成注册码</button>
      </div>

      <div class="rb" id="grs">
        <div class="st" id="gst"></div>
        <div class="key" id="gky"></div>
        <div class="inf" id="gif"></div>
        <div style="margin-top:16px">
          <button class="btn btn-s btn-sm" onclick="cp(gid('gky').textContent)">复制注册码</button>
        </div>
      </div>
    </div>

    <!-- ===== 批量生成 ===== -->
    <div class="panel" id="p-batch">
      <div class="card">
        <h2>批量生成</h2>
        <div class="fg">
          <label>机器码列表（每行一个）</label>
          <textarea id="bi"
            placeholder="A1B2C3D4E5F67890&#10;F6DCC28F9F319381&#10;3A4B5C6D7E8F9012"></textarea>
        </div>
        <div class="fr">
          <div class="fg">
            <label>授权类型</label>
            <select id="bt">
              <option value="standard">标准版（1年）</option>
              <option value="lifetime">终身版（永不过期）</option>
              <option value="trial">试用版（7天）</option>
            </select>
          </div>
        </div>
        <button class="btn btn-p" onclick="doBatch()">批量生成</button>
      </div>

      <div class="card" id="brc" style="display:none">
        <div class="ab">
          <h2>生成结果</h2>
          <div class="sp"></div>
          <button class="btn btn-s btn-sm" onclick="expCsv()">导出 CSV</button>
          <button class="btn btn-s btn-sm" onclick="cpAll()">复制全部</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>机器码</th><th>注册码</th><th>类型</th><th>过期日期</th>
            </tr>
          </thead>
          <tbody id="btb"></tbody>
        </table>
      </div>
    </div>

    <!-- ===== 验证注册码 ===== -->
    <div class="panel" id="p-verify">
      <div class="card">
        <h2>验证注册码</h2>
        <div class="fg">
          <label>机器码</label>
          <input type="text" id="vmc" maxlength="19" style="font-family:Consolas,monospace">
        </div>
        <div class="fg">
          <label>注册码</label>
          <input type="text" id="vky" maxlength="19" style="font-family:Consolas,monospace">
        </div>
        <button class="btn btn-g" onclick="doVer()">验证</button>
      </div>
      <div class="vr" id="vrs">
        <div class="st" id="vst"></div>
        <div class="dt" id="vdt"></div>
      </div>
    </div>

    <!-- ===== 历史记录 ===== -->
    <div class="panel" id="p-history">
      <div class="card">
        <div class="ab">
          <h2>历史记录</h2>
          <div class="sp"></div>
          <button class="btn btn-s btn-sm" onclick="expH()">导出全部</button>
          <button class="btn btn-d btn-sm" onclick="clrH()">清空记录</button>
        </div>
        <table>
          <thead>
            <tr>
              <th>时间</th><th>机器码</th><th>注册码</th><th>类型</th>
              <th>过期</th><th>备注</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="htb"></tbody>
        </table>
        <div class="pager">
          <div class="inf" id="pgi"></div>
          <div>
            <button class="btn btn-s btn-sm" id="pv" onclick="pgNav(-1)">上一页</button>
            <button class="btn btn-s btn-sm" id="nx" onclick="pgNav(1)">下一页</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
/* ============================================================
 * 全局状态
 * ============================================================ */
var _tk = '';      // 登录 token
var pg  = 1;       // 当前页码
var slt = 'standard';  // 当前选中的授权类型

/* ============================================================
 * 工具函数
 * ============================================================ */
function gid(id) { return document.getElementById(id); }

/** 统一 API 调用 */
function api(method, path, body) {
  var headers = { 'Content-Type': 'application/json' };
  if (_tk) headers['Authorization'] = 'Bearer ' + _tk;
  return fetch(path, {
    method: method,
    headers: headers,
    body: JSON.stringify(body || {})
  })
    .then(function (r) { return r.json(); })
    .catch(function (e) { return { ok: false, error: '网络错误: ' + e.message }; });
}

/** HTML 转义，防 XSS */
function escapeHtml(s) {
  var d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

/** 复制文本到剪贴板 */
function cpText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function () { alert('已复制'); });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    alert('已复制');
  }
}

/** 触发文件下载 */
function dl(content, filename) {
  var blob = new Blob(['\ufeff' + content], { type: 'text/csv;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

/* ============================================================
 * 登录 / 登出
 * ============================================================ */
function doLogin() {
  var btn = gid('btn-login'), le = gid('le'), pw = gid('lpw').value;
  btn.disabled = true;
  btn.textContent = '登录中...';
  le.textContent = '';

  api('POST', '/api/login', { password: pw }).then(function (r) {
    if (r.ok) {
      _tk = r.token;
      gid('lp').style.display = 'none';
      gid('ap').style.display = 'block';
      loadH();
    } else {
      le.textContent = r.error || '登录失败';
      btn.disabled = false;
      btn.textContent = '登 录';
    }
  }).catch(function (e) {
    le.textContent = '网络错误: ' + e;
    btn.disabled = false;
    btn.textContent = '登 录';
  });
}

function doLogout() {
  api('POST', '/api/logout', {}).finally(function () { location.reload(); });
}

/* ============================================================
 * 导航
 * ============================================================ */
function sw(name) {
  var panels = ['generate', 'batch', 'verify', 'history'];
  document.querySelectorAll('.tab').forEach(function (t, i) {
    t.classList.toggle('active', panels[i] === name);
  });
  document.querySelectorAll('.panel').forEach(function (p) {
    p.classList.remove('active');
  });
  gid('p-' + name).classList.add('active');
  if (name === 'history') loadH();
}

/* ============================================================
 * 生成注册码
 * ============================================================ */
function sel(card) {
  document.querySelectorAll('.lc-card').forEach(function (c) {
    c.classList.remove('sel');
  });
  card.classList.add('sel');
  slt = card.dataset.t;

  var showCustom = slt !== 'lifetime';
  gid('cex').style.display = showCustom ? 'block' : 'none';
  if (showCustom) {
    gid('gex').min = new Date().toISOString().split('T')[0];
  }
}

/** 机器码输入格式化 + 实时校验 */
function fmt(input) {
  var v = input.value.replace(/[^0-9A-Fa-f]/g, '').toUpperCase().slice(0, 16);
  input.value = v;
  var h = gid('gmh');
  if (!v) { h.textContent = ''; return; }
  if (v.length < 16) {
    h.textContent = v.length + '/16 位';
    h.style.color = '#94a3b8';
  } else {
    h.textContent = '格式正确';
    h.style.color = '#059669';
  }
}

function doGen() {
  api('POST', '/api/generate', {
    machine_code: gid('gmc').value,
    license_type: slt,
    expiry_date: gid('gex').value || null,
    operator: gid('grmk').value || 'web'
  }).then(function (r) {
    var box = gid('grs');
    box.style.display = 'block';
    box.classList.remove('err');

    if (r.ok) {
      gid('gst').textContent = '生成成功';
      gid('gst').style.color = '#059669';
      gid('gky').textContent = r.activation_key;
      gid('gif').textContent = '机器码: ' + r.machine_code +
        '  |  类型: ' + r.license_name +
        '  |  过期: ' + r.expiry_date;
    } else {
      box.classList.add('err');
      gid('gst').textContent = '生成失败';
      gid('gst').style.color = '#e11d48';
      gid('gky').textContent = r.error || '错误';
      gid('gif').textContent = '';
    }
  });
}

/* ============================================================
 * 批量生成
 * ============================================================ */
function doBatch() {
  api('POST', '/api/batch', {
    machine_codes: gid('bi').value,
    license_type: gid('bt').value
  }).then(function (r) {
    if (!r.ok) return;
    gid('brc').style.display = 'block';

    var type = gid('bt').value;
    var typeLabel = type === 'trial'    ? '试用版'
                  : type === 'standard' ? '标准版'
                  :                       '终身版';

    gid('btb').innerHTML = r.results.map(function (row) {
      if (row.ok || row.activation_key) {
        return '<tr>' +
          '<td class="mono">' + escapeHtml(row.machine_code) + '</td>' +
          '<td class="mono">' + escapeHtml(row.activation_key) + '</td>' +
          '<td><span class="tag tag-' + type + '">' + typeLabel + '</span></td>' +
          '<td>' + escapeHtml(row.expiry_date) + '</td>' +
          '</tr>';
      }
      return '<tr>' +
        '<td class="mono">' + escapeHtml(row.machine_code) + '</td>' +
        '<td colspan="3" style="color:#e11d48">' + escapeHtml(row.error) + '</td>' +
        '</tr>';
    }).join('');
  });
}

function cpAll() {
  var rows = document.querySelectorAll('#btb tr');
  var lines = [];
  rows.forEach(function (tr) {
    var t = tr.querySelectorAll('td');
    if (t.length >= 4) {
      lines.push(t[0].textContent + ' | ' + t[1].textContent +
                 ' | ' + t[2].textContent + ' | ' + t[3].textContent);
    }
  });
  cpText(lines.join('\n'));
}

function expCsv() {
  var rows = document.querySelectorAll('#btb tr');
  var csv = '机器码,注册码,授权类型,过期日期\n';
  rows.forEach(function (tr) {
    var t = tr.querySelectorAll('td');
    if (t.length >= 4) {
      csv += t[0].textContent + ',' + t[1].textContent + ',' +
             t[2].textContent + ',' + t[3].textContent + '\n';
    }
  });
  dl(csv, '批量注册码.csv');
}

/* ============================================================
 * 验证注册码
 * ============================================================ */
function doVer() {
  api('POST', '/api/verify', {
    machine_code: gid('vmc').value,
    activation_key: gid('vky').value
  }).then(function (r) {
    var box = gid('vrs');
    box.style.display = 'block';
    if (r.ok && r.valid) {
      box.className = 'vr ok';
      gid('vst').textContent = '验证通过';
      gid('vdt').textContent = '类型: ' + r.license_name +
                               '  |  过期: ' + r.expiry_date;
    } else {
      box.className = 'vr fail';
      gid('vst').textContent = '验证失败';
      gid('vdt').textContent = r.error || '注册码无效';
    }
  });
}

/* ============================================================
 * 历史记录
 * ============================================================ */
function loadH() {
  api('POST', '/api/history', { page: pg, size: 20 }).then(function (r) {
    if (!r.ok) return;

    gid('htb').innerHTML = r.records.map(function (rec) {
      return '<tr>' +
        '<td>' + escapeHtml(rec.created_at) + '</td>' +
        '<td class="mono">' + escapeHtml(rec.machine_code) + '</td>' +
        '<td class="mono">' + escapeHtml(rec.activation_key) + '</td>' +
        '<td><span class="tag tag-' + rec.license_type + '">' +
            escapeHtml(rec.license_name) + '</span></td>' +
        '<td>' + escapeHtml(rec.expiry_date) + '</td>' +
        '<td>' + escapeHtml(rec.operator || '') + '</td>' +
        '<td><button class="btn btn-d btn-sm" onclick="delR(' + rec.id + ')">删除</button></td>' +
        '</tr>';
    }).join('');

    var totalPages = Math.ceil(r.total / r.size);
    gid('pgi').textContent = '共 ' + r.total + ' 条，第 ' + r.page + '/' + totalPages + ' 页';
    gid('pv').disabled = pg <= 1;
    gid('nx').disabled = pg >= totalPages;
  });
}

/** 分页跳转（dir = -1 / +1） */
function pgNav(dir) {
  pg += dir;
  if (pg < 1) pg = 1;
  loadH();
}

function delR(id) {
  if (!confirm('确定删除？')) return;
  api('POST', '/api/delete', { id: id }).then(function (r) {
    if (r.ok) loadH();
  });
}

function clrH() {
  if (!confirm('确定清空所有记录？不可恢复！')) return;
  api('POST', '/api/clear', {}).then(function (r) {
    if (r.ok) loadH();
  });
}

function expH() {
  api('POST', '/api/export', {}).then(function (r) {
    if (r.ok) dl(r.csv, '注册记录.csv');
  });
}

/* ============================================================
 * 简易别名：cp = cpText（供 HTML 内联 onclick 调用）
 * ============================================================ */
var cp = cpText;

/* ============================================================
 * 初始化
 * ============================================================ */
gid('si').textContent = location.hostname + ':' + (location.port || 5800);
gid('btn-login').addEventListener('click', doLogin);
gid('lpw').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') doLogin();
});
</script>
