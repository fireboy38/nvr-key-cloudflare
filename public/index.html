<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>注册机 · Web 管理台</title>
  <style>
    /* ============== 设计变量 - 深色玻璃拟态主题 ============== */
    :root {
      /* 主色 - 紫蓝渐变系 */
      --brand-1: #6366f1;       /* indigo-500 */
      --brand-2: #8b5cf6;       /* violet-500 */
      --brand-3: #ec4899;       /* pink-500 */
      --accent: #06b6d4;        /* cyan-500 */
      --success: #10b981;
      --warning: #f59e0b;
      --danger: #ef4444;

      /* 深色背景层级 */
      --bg-base: #0b0e1f;        /* 最底层 */
      --bg-elevated: #131734;    /* 卡片底色 */
      --bg-overlay: #1c2148;     /* 悬浮层 */
      --bg-hover: #252b5c;       /* 悬停态 */

      /* 文字层级 */
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --text-muted: #64748b;
      --text-dim: #475569;

      /* 边框 */
      --border: rgba(255, 255, 255, 0.08);
      --border-strong: rgba(255, 255, 255, 0.16);
      --border-brand: rgba(139, 92, 246, 0.4);

      /* 阴影 */
      --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
      --shadow-md: 0 8px 24px rgba(0, 0, 0, 0.4);
      --shadow-lg: 0 20px 60px rgba(0, 0, 0, 0.5);
      --shadow-glow: 0 0 32px rgba(139, 92, 246, 0.35);

      /* 渐变 */
      --grad-brand: linear-gradient(135deg, #6366f1 0%, #8b5cf6 50%, #ec4899 100%);
      --grad-dark: linear-gradient(135deg, #0b0e1f 0%, #1c2148 100%);
      --grad-card: linear-gradient(145deg, rgba(28, 33, 72, 0.6) 0%, rgba(19, 23, 52, 0.8) 100%);

      /* 圆角 */
      --r-sm: 6px;
      --r-md: 10px;
      --r-lg: 16px;
      --r-xl: 24px;

      /* 字体 */
      --font-sans: "Inter", "PingFang SC", "Microsoft YaHei", -apple-system, sans-serif;
      --font-mono: "JetBrains Mono", "SF Mono", Consolas, monospace;
    }

    /* ============== 基础重置 ============== */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body { height: 100%; }

    body {
      font-family: var(--font-sans);
      background: var(--bg-base);
      color: var(--text-primary);
      font-size: 14px;
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
    }

    /* 背景装饰 - 流动的光晕 */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 20% 10%, rgba(99, 102, 241, 0.18), transparent 60%),
        radial-gradient(ellipse 60% 50% at 80% 30%, rgba(236, 72, 153, 0.12), transparent 60%),
        radial-gradient(ellipse 70% 60% at 50% 90%, rgba(6, 182, 212, 0.10), transparent 60%);
      pointer-events: none;
      z-index: 0;
      animation: bgShift 20s ease-in-out infinite alternate;
    }

    @keyframes bgShift {
      0%   { transform: translate(0, 0) scale(1); }
      50%  { transform: translate(-2%, 2%) scale(1.05); }
      100% { transform: translate(2%, -2%) scale(1); }
    }

    /* ============== 滚动条美化 ============== */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-track { background: rgba(0,0,0,0.2); }
    ::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, var(--brand-1), var(--brand-2));
      border-radius: 5px;
      border: 2px solid var(--bg-base);
    }
    ::-webkit-scrollbar-thumb:hover { background: var(--brand-2); }

    /* ============== 登录页 ============== */
    .login-wrap {
      position: relative;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }

    .login-card {
      position: relative;
      width: 100%;
      max-width: 420px;
      padding: 48px 40px 40px;
      background: var(--grad-card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border: 1px solid var(--border-strong);
      border-radius: var(--r-xl);
      box-shadow: var(--shadow-lg), var(--shadow-glow);
      animation: cardIn 0.6s cubic-bezier(0.22, 1, 0.36, 1);
    }

    @keyframes cardIn {
      from { opacity: 0; transform: translateY(20px) scale(0.96); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    /* 卡片顶部光晕装饰 */
    .login-card::before {
      content: "";
      position: absolute;
      top: -1px; left: -1px; right: -1px;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--brand-2), transparent);
    }

    .login-logo {
      width: 72px;
      height: 72px;
      margin: 0 auto 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--grad-brand);
      border-radius: 18px;
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4), inset 0 1px 0 rgba(255,255,255,0.2);
      animation: pulse 3s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 8px 24px rgba(139, 92, 246, 0.4), inset 0 1px 0 rgba(255,255,255,0.2); }
      50% { box-shadow: 0 8px 36px rgba(139, 92, 246, 0.7), inset 0 1px 0 rgba(255,255,255,0.3); }
    }

    .login-logo svg { width: 36px; height: 36px; color: #fff; }

    .login-card h1 {
      font-size: 24px;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
      background: var(--grad-brand);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      letter-spacing: 0.5px;
    }

    .login-card p {
      text-align: center;
      color: var(--text-muted);
      font-size: 13px;
      margin-bottom: 32px;
      letter-spacing: 0.3px;
    }

    .login-card input {
      width: 100%;
      padding: 14px 18px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      color: var(--text-primary);
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s ease;
      margin-bottom: 20px;
    }

    .login-card input::placeholder { color: var(--text-dim); }

    .login-card input:focus {
      border-color: var(--brand-2);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.15);
    }

    .login-card button {
      width: 100%;
      padding: 14px;
      background: var(--grad-brand);
      color: #fff;
      border: none;
      border-radius: var(--r-md);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      letter-spacing: 1px;
      transition: all 0.25s ease;
      box-shadow: 0 4px 16px rgba(139, 92, 246, 0.3);
      position: relative;
      overflow: hidden;
    }

    .login-card button::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, transparent 30%, rgba(255,255,255,0.2) 50%, transparent 70%);
      transform: translateX(-100%);
      transition: transform 0.6s ease;
    }

    .login-card button:hover:not(:disabled) {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.5);
    }

    .login-card button:hover:not(:disabled)::before { transform: translateX(100%); }

    .login-card button:disabled { opacity: 0.6; cursor: not-allowed; }

    .login-err {
      color: var(--danger);
      font-size: 13px;
      text-align: center;
      margin-top: 16px;
      padding: 8px 12px;
      background: rgba(239, 68, 68, 0.1);
      border: 1px solid rgba(239, 68, 68, 0.2);
      border-radius: var(--r-sm);
      display: none;
    }

    .login-err:not(:empty) { display: block; animation: shake 0.4s; }

    @keyframes shake {
      0%, 100% { transform: translateX(0); }
      25% { transform: translateX(-6px); }
      75% { transform: translateX(6px); }
    }

    /* ============== 主应用 ============== */
    .app {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: none;
    }

    .app[style*="block"] { animation: fadeIn 0.4s ease; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ============== Header ============== */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: rgba(11, 14, 31, 0.75);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .header-logo {
      width: 36px;
      height: 36px;
      background: var(--grad-brand);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 12px rgba(139, 92, 246, 0.4);
    }
    .header-logo svg { width: 20px; height: 20px; color: #fff; }

    .header h1 {
      font-size: 17px;
      font-weight: 600;
      letter-spacing: 0.5px;
      color: var(--text-primary);
    }

    .header .info {
      font-size: 12px;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .header .info span {
      color: var(--text-secondary);
      font-family: var(--font-mono);
      padding: 4px 10px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: var(--r-sm);
      border: 1px solid var(--border);
    }

    .header button {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.25);
      padding: 6px 14px;
      border-radius: var(--r-sm);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      transition: all 0.2s ease;
    }

    .header button:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.4);
    }

    /* ============== 标签栏 ============== */
    .tabs {
      display: flex;
      background: rgba(19, 23, 52, 0.5);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      gap: 4px;
    }

    .tab {
      padding: 16px 24px;
      cursor: pointer;
      font-weight: 500;
      font-size: 14px;
      color: var(--text-muted);
      border-bottom: 2px solid transparent;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      gap: 8px;
      position: relative;
    }

    .tab svg { width: 16px; height: 16px; }

    .tab:hover { color: var(--text-secondary); }

    .tab.active {
      color: #fff;
      border-bottom-color: var(--brand-2);
    }

    .tab.active::after {
      content: "";
      position: absolute;
      bottom: -1px; left: 50%;
      transform: translateX(-50%);
      width: 60%;
      height: 1px;
      background: var(--grad-brand);
      box-shadow: 0 0 8px var(--brand-2);
    }

    /* ============== 主体内容 ============== */
    .content {
      max-width: 1000px;
      margin: 32px auto;
      padding: 0 24px;
    }

    .panel { display: none; }
    .panel.active { display: block; animation: fadeIn 0.35s ease; }

    .card {
      background: var(--grad-card);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border: 1px solid var(--border);
      border-radius: var(--r-lg);
      padding: 28px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-md);
      transition: border-color 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover { border-color: var(--border-strong); }

    .card h2 {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
      margin-bottom: 20px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .card h2::before {
      content: "";
      width: 4px;
      height: 18px;
      background: var(--grad-brand);
      border-radius: 2px;
      box-shadow: 0 0 8px rgba(139, 92, 246, 0.5);
    }

    /* ============== 表单 ============== */
    .fg { margin-bottom: 18px; }

    .fg label {
      display: block;
      font-weight: 500;
      font-size: 13px;
      color: var(--text-secondary);
      margin-bottom: 8px;
      letter-spacing: 0.2px;
    }

    .fg input,
    .fg select,
    .fg textarea {
      width: 100%;
      padding: 12px 16px;
      background: rgba(0, 0, 0, 0.25);
      border: 1px solid var(--border);
      border-radius: var(--r-md);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      outline: none;
      transition: all 0.2s ease;
    }

    .fg input::placeholder,
    .fg textarea::placeholder { color: var(--text-dim); }

    .fg input:focus,
    .fg select:focus,
    .fg textarea:focus {
      border-color: var(--brand-2);
      background: rgba(0, 0, 0, 0.4);
      box-shadow: 0 0 0 4px rgba(139, 92, 246, 0.12);
    }

    .fg input[type="date"]::-webkit-calendar-picker-indicator {
      filter: invert(1);
      opacity: 0.6;
      cursor: pointer;
    }

    .fg textarea {
      min-height: 130px;
      resize: vertical;
      font-family: var(--font-mono);
      line-height: 1.6;
    }

    .fg select {
      appearance: none;
      background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%23cbd5e1' stroke-width='2'><polyline points='6 9 12 15 18 9'/></svg>");
      background-repeat: no-repeat;
      background-position: right 12px center;
      background-size: 18px;
      padding-right: 40px;
    }

    .fg select option { background: var(--bg-elevated); color: var(--text-primary); }

    .fg .hint {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
      letter-spacing: 0.2px;
    }

    .fr { display: flex; gap: 16px; }
    .fr .fg { flex: 1; }

    /* ============== 授权类型卡片 ============== */
    .lc {
      display: flex;
      gap: 14px;
      margin-bottom: 18px;
    }

    .lc-card {
      flex: 1;
      padding: 20px 16px;
      text-align: center;
      cursor: pointer;
      background: rgba(0, 0, 0, 0.2);
      border: 1.5px solid var(--border);
      border-radius: var(--r-md);
      transition: all 0.25s ease;
      position: relative;
      overflow: hidden;
    }

    .lc-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: var(--grad-brand);
      opacity: 0;
      transition: opacity 0.25s ease;
      pointer-events: none;
    }

    .lc-card:hover {
      border-color: var(--border-strong);
      transform: translateY(-2px);
    }

    .lc-card.sel {
      border-color: var(--brand-2);
      background: rgba(139, 92, 246, 0.08);
      box-shadow: 0 0 0 1px var(--brand-2), 0 8px 24px rgba(139, 92, 246, 0.2);
    }

    .lc-card .nm {
      font-weight: 600;
      font-size: 15px;
      color: var(--text-primary);
      margin-bottom: 4px;
    }

    .lc-card .ds {
      font-size: 12px;
      color: var(--text-muted);
    }

    .lc-card.sel .nm { color: #c4b5fd; }

    /* ============== 按钮 ============== */
    .btn {
      padding: 11px 22px;
      border: none;
      border-radius: var(--r-md);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: all 0.2s ease;
      font-family: inherit;
      letter-spacing: 0.3px;
    }

    .btn svg { width: 16px; height: 16px; }

    /* 主按钮 - 紫蓝渐变 */
    .btn-p {
      background: var(--grad-brand);
      color: #fff;
      box-shadow: 0 4px 16px rgba(139, 92, 246, 0.3);
    }
    .btn-p:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(139, 92, 246, 0.5);
    }
    .btn-p:active { transform: translateY(0); }

    /* 次按钮 - 玻璃态 */
    .btn-s {
      background: rgba(255, 255, 255, 0.06);
      color: var(--text-secondary);
      border: 1px solid var(--border);
      backdrop-filter: blur(8px);
    }
    .btn-s:hover {
      background: rgba(255, 255, 255, 0.1);
      color: var(--text-primary);
      border-color: var(--border-strong);
    }

    /* 危险按钮 */
    .btn-d {
      background: rgba(239, 68, 68, 0.1);
      color: var(--danger);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }
    .btn-d:hover {
      background: rgba(239, 68, 68, 0.2);
      border-color: rgba(239, 68, 68, 0.5);
    }

    /* 验证按钮 - 青色 */
    .btn-g {
      background: linear-gradient(135deg, #06b6d4 0%, #10b981 100%);
      color: #fff;
      box-shadow: 0 4px 16px rgba(6, 182, 212, 0.3);
    }
    .btn-g:hover {
      transform: translateY(-1px);
      box-shadow: 0 8px 24px rgba(6, 182, 212, 0.5);
    }

    .btn-sm { padding: 7px 14px; font-size: 13px; }

    /* ============== 生成结果区 ============== */
    .rb {
      margin-top: 20px;
      padding: 28px;
      background: linear-gradient(145deg, rgba(139, 92, 246, 0.12), rgba(99, 102, 241, 0.06));
      border: 1px solid var(--border-brand);
      border-radius: var(--r-lg);
      text-align: center;
      display: none;
      backdrop-filter: blur(12px);
      animation: fadeIn 0.4s ease;
    }

    .rb .st {
      font-size: 14px;
      font-weight: 600;
      color: var(--success);
      letter-spacing: 1px;
    }

    .rb .key {
      font-size: 32px;
      font-weight: 700;
      color: #fff;
      font-family: var(--font-mono);
      letter-spacing: 6px;
      margin: 14px 0;
      text-shadow: 0 0 24px rgba(139, 92, 246, 0.6);
      background: var(--grad-brand);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .rb .inf {
      font-size: 13px;
      color: var(--text-muted);
      letter-spacing: 0.3px;
    }

    .rb.err {
      background: linear-gradient(145deg, rgba(239, 68, 68, 0.12), rgba(239, 68, 68, 0.04));
      border-color: rgba(239, 68, 68, 0.4);
    }
    .rb.err .st { color: var(--danger); }
    .rb.err .key {
      -webkit-text-fill-color: var(--danger);
      text-shadow: 0 0 24px rgba(239, 68, 68, 0.4);
      font-size: 18px;
      letter-spacing: 0;
    }

    /* ============== 表格 ============== */
    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
    }

    thead { background: rgba(0, 0, 0, 0.2); }

    th {
      padding: 12px 14px;
      text-align: left;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      border-bottom: 1px solid var(--border);
    }

    th:first-child { border-top-left-radius: var(--r-md); }
    th:last-child  { border-top-right-radius: var(--r-md); }

    td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }

    tr:hover td {
      background: rgba(139, 92, 246, 0.04);
      color: var(--text-primary);
    }

    tr:last-child td { border-bottom: none; }

    .mono {
      font-family: var(--font-mono);
      color: var(--text-primary);
      font-size: 12.5px;
    }

    /* ============== 标签徽章 ============== */
    .tag {
      display: inline-block;
      padding: 3px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.5px;
      text-transform: uppercase;
    }

    .tag-trial {
      background: rgba(245, 158, 11, 0.15);
      color: var(--warning);
      border: 1px solid rgba(245, 158, 11, 0.3);
    }
    .tag-standard {
      background: rgba(139, 92, 246, 0.15);
      color: #c4b5fd;
      border: 1px solid rgba(139, 92, 246, 0.3);
    }
    .tag-lifetime {
      background: rgba(16, 185, 129, 0.15);
      color: #6ee7b7;
      border: 1px solid rgba(16, 185, 129, 0.3);
    }

    /* ============== 分页 ============== */
    .pager {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-top: 20px;
      padding-top: 16px;
      border-top: 1px solid var(--border);
    }

    .pager .inf { font-size: 13px; color: var(--text-muted); }

    /* ============== 工具栏 ============== */
    .ab {
      display: flex;
      gap: 10px;
      margin-bottom: 18px;
      align-items: center;
    }
    .ab .sp { flex: 1; }

    /* ============== 验证结果 ============== */
    .vr {
      margin-top: 18px;
      padding: 22px;
      border-radius: var(--r-lg);
      text-align: center;
      display: none;
      animation: fadeIn 0.4s ease;
      backdrop-filter: blur(12px);
    }

    .vr.ok {
      background: linear-gradient(145deg, rgba(16, 185, 129, 0.15), rgba(16, 185, 129, 0.05));
      border: 1px solid rgba(16, 185, 129, 0.4);
    }
    .vr.fail {
      background: linear-gradient(145deg, rgba(239, 68, 68, 0.15), rgba(239, 68, 68, 0.05));
      border: 1px solid rgba(239, 68, 68, 0.4);
    }

    .vr .st {
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .vr .st svg { width: 24px; height: 24px; }
    .vr.ok .st { color: var(--success); }
    .vr.fail .st { color: var(--danger); }

    .vr .dt {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 10px;
      letter-spacing: 0.3px;
    }

    /* ============== 空状态 ============== */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text-muted);
    }
    .empty-state svg { width: 48px; height: 48px; opacity: 0.4; margin-bottom: 12px; }

    /* ============== 响应式 ============== */
    @media (max-width: 768px) {
      .header { padding: 12px 16px; }
      .header .info { display: none; }
      .tabs { padding: 0 8px; overflow-x: auto; }
      .tab { padding: 14px 16px; white-space: nowrap; }
      .tab span { display: none; }
      .content { padding: 0 12px; margin: 20px auto; }
      .card { padding: 20px; }
      .lc { flex-direction: column; }
      .fr { flex-direction: column; gap: 0; }
      .rb .key { font-size: 22px; letter-spacing: 3px; }
    }
  </style>
</head>
<body>

<!-- ========== 登录页 ========== -->
<div class="login-wrap" id="lp">
  <div class="login-card">
    <div class="login-logo">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
        <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        <circle cx="12" cy="16" r="1"/>
      </svg>
    </div>
    <h1>注册机 · 管理台</h1>
    <p>海康录像批量下载工具 — 密钥管理系统</p>
    <input type="password" id="lpw" placeholder="请输入管理密码" autofocus>
    <button id="btn-login">
      <span style="display:inline-flex;align-items:center;gap:8px;">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M15 3h4a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2h-4"/>
          <polyline points="10 17 15 12 10 7"/>
          <line x1="15" y1="12" x2="3" y2="12"/>
        </svg>
        登 录
      </span>
    </button>
    <div class="login-err" id="le"></div>
  </div>
</div>

<!-- ========== 主应用 ========== -->
<div class="app" id="ap">
  <div class="header">
    <div class="header-left">
      <div class="header-logo">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
          <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
        </svg>
      </div>
      <h1>注册机 · Web 管理台</h1>
    </div>
    <div class="info">
      <span id="si"></span>
      <button onclick="doLogout()">退出</button>
    </div>
  </div>

  <div class="tabs">
    <div class="tab active" data-panel="generate" onclick="sw('generate')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
      </svg>
      <span>生成注册码</span>
    </div>
    <div class="tab" data-panel="batch" onclick="sw('batch')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="7" height="7"/>
        <rect x="14" y="3" width="7" height="7"/>
        <rect x="3" y="14" width="7" height="7"/>
        <rect x="14" y="14" width="7" height="7"/>
      </svg>
      <span>批量生成</span>
    </div>
    <div class="tab" data-panel="verify" onclick="sw('verify')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
        <polyline points="22 4 12 14.01 9 11.01"/>
      </svg>
      <span>验证注册码</span>
    </div>
    <div class="tab" data-panel="history" onclick="sw('history')">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="12" cy="12" r="10"/>
        <polyline points="12 6 12 12 16 14"/>
      </svg>
      <span>历史记录</span>
    </div>
  </div>

  <div class="content">

    <!-- ===== 生成注册码 ===== -->
    <div class="panel active" id="p-generate">
      <div class="card">
        <h2>生成注册码</h2>

        <div class="fg">
          <label>机器码</label>
          <input type="text" id="gmc" placeholder="A1B2C3D4E5F67890"
                 maxlength="19" oninput="fmt(this)"
                 style="font-family:var(--font-mono)">
          <div class="hint" id="gmh"></div>
        </div>

        <div class="fg">
          <label>授权类型</label>
          <div class="lc" id="lcs">
            <div class="lc-card" data-t="trial" onclick="sel(this)">
              <div class="nm">试用版</div>
              <div class="ds">7天有效期</div>
            </div>
            <div class="lc-card sel" data-t="standard" onclick="sel(this)">
              <div class="nm">标准版</div>
              <div class="ds">1年有效期（365天）</div>
            </div>
            <div class="lc-card" data-t="lifetime" onclick="sel(this)">
              <div class="nm">终身版</div>
              <div class="ds">永不过期</div>
            </div>
          </div>
        </div>

        <div class="fg" id="cex" style="display:none">
          <label>自定义过期日期</label>
          <input type="date" id="gex" min="">
        </div>

        <div class="fg">
          <label>备注（使用者）</label>
          <input type="text" id="grmk" placeholder="例如：张三-财务部">
        </div>

        <button class="btn btn-p" onclick="doGen()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M13 2L3 14h9l-1 8 10-12h-9l1-8z"/>
          </svg>
          生成注册码
        </button>
      </div>

      <div class="rb" id="grs">
        <div class="st" id="gst"></div>
        <div class="key" id="gky"></div>
        <div class="inf" id="gif"></div>
        <div style="margin-top:18px">
          <button class="btn btn-s btn-sm" onclick="cp(gid('gky').textContent)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            复制注册码
          </button>
        </div>
      </div>
    </div>

    <!-- ===== 批量生成 ===== -->
    <div class="panel" id="p-batch">
      <div class="card">
        <h2>批量生成</h2>
        <div class="fg">
          <label>机器码列表（每行一个）</label>
          <textarea id="bi"
            placeholder="A1B2C3D4E5F67890&#10;F6DCC28F9F319381&#10;3A4B5C6D7E8F9012"></textarea>
        </div>
        <div class="fr">
          <div class="fg">
            <label>授权类型</label>
            <select id="bt">
              <option value="standard">标准版（1年）</option>
              <option value="lifetime">终身版（永不过期）</option>
              <option value="trial">试用版（7天）</option>
            </select>
          </div>
        </div>
        <button class="btn btn-p" onclick="doBatch()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <rect x="3" y="3" width="7" height="7"/>
            <rect x="14" y="3" width="7" height="7"/>
            <rect x="3" y="14" width="7" height="7"/>
            <rect x="14" y="14" width="7" height="7"/>
          </svg>
          批量生成
        </button>
      </div>

      <div class="card" id="brc" style="display:none">
        <div class="ab">
          <h2>生成结果</h2>
          <div class="sp"></div>
          <button class="btn btn-s btn-sm" onclick="expCsv()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            导出 CSV
          </button>
          <button class="btn btn-s btn-sm" onclick="cpAll()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"/>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/>
            </svg>
            复制全部
          </button>
        </div>
        <table>
          <thead>
            <tr>
              <th>机器码</th><th>注册码</th><th>类型</th><th>过期日期</th>
            </tr>
          </thead>
          <tbody id="btb"></tbody>
        </table>
      </div>
    </div>

    <!-- ===== 验证注册码 ===== -->
    <div class="panel" id="p-verify">
      <div class="card">
        <h2>验证注册码</h2>
        <div class="fg">
          <label>机器码</label>
          <input type="text" id="vmc" maxlength="19" style="font-family:var(--font-mono)">
        </div>
        <div class="fg">
          <label>注册码</label>
          <input type="text" id="vky" maxlength="19" style="font-family:var(--font-mono)">
        </div>
        <button class="btn btn-g" onclick="doVer()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/>
            <polyline points="22 4 12 14.01 9 11.01"/>
          </svg>
          验证
        </button>
      </div>
      <div class="vr" id="vrs">
        <div class="st" id="vst"></div>
        <div class="dt" id="vdt"></div>
      </div>
    </div>

    <!-- ===== 历史记录 ===== -->
    <div class="panel" id="p-history">
      <div class="card">
        <div class="ab">
          <h2>历史记录</h2>
          <div class="sp"></div>
          <button class="btn btn-s btn-sm" onclick="expH()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
              <polyline points="7 10 12 15 17 10"/>
              <line x1="12" y1="15" x2="12" y2="3"/>
            </svg>
            导出全部
          </button>
          <button class="btn btn-d btn-sm" onclick="clrH()">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="3 6 5 6 21 6"/>
              <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
            </svg>
            清空记录
          </button>
        </div>
        <table>
          <thead>
            <tr>
              <th>时间</th><th>机器码</th><th>注册码</th><th>类型</th>
              <th>过期</th><th>备注</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="htb"></tbody>
        </table>
        <div class="pager">
          <div class="inf" id="pgi"></div>
          <div>
            <button class="btn btn-s btn-sm" id="pv" onclick="pgNav(-1)">上一页</button>
            <button class="btn btn-s btn-sm" id="nx" onclick="pgNav(1)">下一页</button>
          </div>
        </div>
      </div>
    </div>

  </div>
</div>

<script>
/* ============================================================
 * 全局状态
 * ============================================================ */
var _tk = '';      // 登录 token
var pg  = 1;       // 当前页码
var slt = 'standard';  // 当前选中的授权类型

/* ============================================================
 * 工具函数
 * ============================================================ */
function gid(id) { return document.getElementById(id); }

/** 统一 API 调用 */
function api(method, path, body) {
  var headers = { 'Content-Type': 'application/json' };
  if (_tk) headers['Authorization'] = 'Bearer ' + _tk;
  return fetch(path, {
    method: method,
    headers: headers,
    body: JSON.stringify(body || {})
  })
    .then(function (r) { return r.json(); })
    .catch(function (e) { return { ok: false, error: '网络错误: ' + e.message }; });
}

/** HTML 转义，防 XSS */
function escapeHtml(s) {
  var d = document.createElement('div');
  d.textContent = s == null ? '' : String(s);
  return d.innerHTML;
}

/** 复制文本到剪贴板 */
function cpText(text) {
  if (navigator.clipboard) {
    navigator.clipboard.writeText(text).then(function () {
      showToast('已复制到剪贴板');
    });
  } else {
    var ta = document.createElement('textarea');
    ta.value = text;
    document.body.appendChild(ta);
    ta.select();
    document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('已复制');
  }
}

/** 轻量 toast 提示 */
function showToast(msg) {
  var t = document.createElement('div');
  t.textContent = msg;
  t.style.cssText = 'position:fixed;top:24px;left:50%;transform:translateX(-50%);' +
    'background:linear-gradient(135deg,#6366f1,#8b5cf6);color:#fff;padding:10px 20px;' +
    'border-radius:10px;box-shadow:0 8px 24px rgba(139,92,246,0.4);' +
    'font-size:13px;font-weight:500;z-index:9999;' +
    'animation:fadeIn 0.3s ease;letter-spacing:0.5px;';
  document.body.appendChild(t);
  setTimeout(function () {
    t.style.opacity = '0';
    t.style.transition = 'opacity 0.3s';
    setTimeout(function () { document.body.removeChild(t); }, 300);
  }, 1500);
}

/** 触发文件下载 */
function dl(content, filename) {
  var blob = new Blob(['\ufeff' + content], { type: 'text/csv;charset=utf-8' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
}

/* ============================================================
 * 登录 / 登出
 * ============================================================ */
function doLogin() {
  var btn = gid('btn-login'), le = gid('le'), pw = gid('lpw').value;
  btn.disabled = true;
  btn.querySelector('span').textContent = '登录中...';
  le.textContent = '';

  api('POST', '/api/login', { password: pw }).then(function (r) {
    if (r.ok) {
      _tk = r.token;
      gid('lp').style.display = 'none';
      gid('ap').style.display = 'block';
      loadH();
    } else {
      le.textContent = r.error || '登录失败';
      btn.disabled = false;
      btn.querySelector('span').textContent = '登 录';
    }
  }).catch(function (e) {
    le.textContent = '网络错误: ' + e;
    btn.disabled = false;
    btn.querySelector('span').textContent = '登 录';
  });
}

function doLogout() {
  api('POST', '/api/logout', {}).finally(function () { location.reload(); });
}

/* ============================================================
 * 导航
 * ============================================================ */
function sw(name) {
  var panels = ['generate', 'batch', 'verify', 'history'];
  document.querySelectorAll('.tab').forEach(function (t, i) {
    t.classList.toggle('active', panels[i] === name);
  });
  document.querySelectorAll('.panel').forEach(function (p) {
    p.classList.remove('active');
  });
  gid('p-' + name).classList.add('active');
  if (name === 'history') loadH();
}

/* ============================================================
 * 生成注册码
 * ============================================================ */
function sel(card) {
  document.querySelectorAll('.lc-card').forEach(function (c) {
    c.classList.remove('sel');
  });
  card.classList.add('sel');
  slt = card.dataset.t;

  var showCustom = slt !== 'lifetime';
  gid('cex').style.display = showCustom ? 'block' : 'none';
  if (showCustom) {
    gid('gex').min = new Date().toISOString().split('T')[0];
  }
}

/** 机器码输入格式化 + 实时校验 */
function fmt(input) {
  var v = input.value.replace(/[^0-9A-Fa-f]/g, '').toUpperCase().slice(0, 16);
  input.value = v;
  var h = gid('gmh');
  if (!v) { h.textContent = ''; return; }
  if (v.length < 16) {
    h.textContent = v.length + '/16 位';
    h.style.color = 'var(--text-muted)';
  } else {
    h.textContent = '✓ 格式正确';
    h.style.color = 'var(--success)';
  }
}

function doGen() {
  api('POST', '/api/generate', {
    machine_code: gid('gmc').value,
    license_type: slt,
    expiry_date: gid('gex').value || null,
    operator: gid('grmk').value || 'web'
  }).then(function (r) {
    var box = gid('grs');
    box.style.display = 'block';
    box.classList.remove('err');

    if (r.ok) {
      gid('gst').textContent = '✓ 生成成功';
      gid('gst').style.color = 'var(--success)';
      gid('gky').textContent = r.activation_key;
      gid('gif').textContent = '机器码: ' + r.machine_code +
        '  ·  类型: ' + r.license_name +
        '  ·  过期: ' + r.expiry_date;
    } else {
      box.classList.add('err');
      gid('gst').textContent = '✕ 生成失败';
      gid('gst').style.color = 'var(--danger)';
      gid('gky').textContent = r.error || '错误';
      gid('gif').textContent = '';
    }
  });
}

/* ============================================================
 * 批量生成
 * ============================================================ */
function doBatch() {
  api('POST', '/api/batch', {
    machine_codes: gid('bi').value,
    license_type: gid('bt').value
  }).then(function (r) {
    if (!r.ok) return;
    gid('brc').style.display = 'block';

    var type = gid('bt').value;
    var typeLabel = type === 'trial'    ? '试用版'
                  : type === 'standard' ? '标准版'
                  :                       '终身版';

    gid('btb').innerHTML = r.results.map(function (row) {
      if (row.ok || row.activation_key) {
        return '<tr>' +
          '<td class="mono">' + escapeHtml(row.machine_code) + '</td>' +
          '<td class="mono">' + escapeHtml(row.activation_key) + '</td>' +
          '<td><span class="tag tag-' + type + '">' + typeLabel + '</span></td>' +
          '<td>' + escapeHtml(row.expiry_date) + '</td>' +
          '</tr>';
      }
      return '<tr>' +
        '<td class="mono">' + escapeHtml(row.machine_code) + '</td>' +
        '<td colspan="3" style="color:var(--danger)">' + escapeHtml(row.error) + '</td>' +
        '</tr>';
    }).join('');
  });
}

function cpAll() {
  var rows = document.querySelectorAll('#btb tr');
  var lines = [];
  rows.forEach(function (tr) {
    var t = tr.querySelectorAll('td');
    if (t.length >= 4) {
      lines.push(t[0].textContent + ' | ' + t[1].textContent +
                 ' | ' + t[2].textContent + ' | ' + t[3].textContent);
    }
  });
  cpText(lines.join('\n'));
}

function expCsv() {
  var rows = document.querySelectorAll('#btb tr');
  var csv = '机器码,注册码,授权类型,过期日期\n';
  rows.forEach(function (tr) {
    var t = tr.querySelectorAll('td');
    if (t.length >= 4) {
      csv += t[0].textContent + ',' + t[1].textContent + ',' +
             t[2].textContent + ',' + t[3].textContent + '\n';
    }
  });
  dl(csv, '批量注册码.csv');
}

/* ============================================================
 * 验证注册码
 * ============================================================ */
function doVer() {
  api('POST', '/api/verify', {
    machine_code: gid('vmc').value,
    activation_key: gid('vky').value
  }).then(function (r) {
    var box = gid('vrs');
    box.style.display = 'block';
    var checkIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    var xIcon = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>';

    if (r.ok && r.valid) {
      box.className = 'vr ok';
      gid('vst').innerHTML = checkIcon + ' 验证通过';
      gid('vdt').textContent = '类型: ' + r.license_name +
                               '  ·  过期: ' + r.expiry_date;
    } else {
      box.className = 'vr fail';
      gid('vst').innerHTML = xIcon + ' 验证失败';
      gid('vdt').textContent = r.error || '注册码无效';
    }
  });
}

/* ============================================================
 * 历史记录
 * ============================================================ */
function loadH() {
  api('POST', '/api/history', { page: pg, size: 20 }).then(function (r) {
    if (!r.ok) return;

    if (!r.records || r.records.length === 0) {
      gid('htb').innerHTML = '<tr><td colspan="7" style="text-align:center;padding:60px;color:var(--text-muted);">' +
        '<div style="opacity:0.5;margin-bottom:8px;"><svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" style="display:inline-block;"><path d="M13 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V9z"/><polyline points="13 2 13 9 20 9"/></svg></div>' +
        '暂无记录</td></tr>';
      gid('pgi').textContent = '';
      gid('pv').disabled = true;
      gid('nx').disabled = true;
      return;
    }

    gid('htb').innerHTML = r.records.map(function (rec) {
      return '<tr>' +
        '<td style="color:var(--text-muted);font-size:12px;">' + escapeHtml(rec.created_at) + '</td>' +
        '<td class="mono">' + escapeHtml(rec.machine_code) + '</td>' +
        '<td class="mono">' + escapeHtml(rec.activation_key) + '</td>' +
        '<td><span class="tag tag-' + rec.license_type + '">' +
            escapeHtml(rec.license_name) + '</span></td>' +
        '<td>' + escapeHtml(rec.expiry_date) + '</td>' +
        '<td>' + escapeHtml(rec.operator || '') + '</td>' +
        '<td><button class="btn btn-d btn-sm" onclick="delR(' + rec.id + ')">删除</button></td>' +
        '</tr>';
    }).join('');

    var totalPages = Math.ceil(r.total / r.size);
    gid('pgi').textContent = '共 ' + r.total + ' 条，第 ' + r.page + '/' + totalPages + ' 页';
    gid('pv').disabled = pg <= 1;
    gid('nx').disabled = pg >= totalPages;
  });
}

/** 分页跳转（dir = -1 / +1） */
function pgNav(dir) {
  pg += dir;
  if (pg < 1) pg = 1;
  loadH();
}

function delR(id) {
  if (!confirm('确定删除？')) return;
  api('POST', '/api/delete', { id: id }).then(function (r) {
    if (r.ok) { showToast('已删除'); loadH(); }
  });
}

function clrH() {
  if (!confirm('确定清空所有记录？不可恢复！')) return;
  api('POST', '/api/clear', {}).then(function (r) {
    if (r.ok) { showToast('已清空'); loadH(); }
  });
}

function expH() {
  api('POST', '/api/export', {}).then(function (r) {
    if (r.ok) { dl(r.csv, '注册记录.csv'); showToast('已导出'); }
  });
}

/* ============================================================
 * 简易别名：cp = cpText（供 HTML 内联 onclick 调用）
 * ============================================================ */
var cp = cpText;

/* ============================================================
 * 初始化
 * ============================================================ */
gid('si').textContent = location.hostname + (location.port ? ':' + location.port : '');
gid('btn-login').addEventListener('click', doLogin);
gid('lpw').addEventListener('keydown', function (e) {
  if (e.key === 'Enter') doLogin();
});
</script>
