name = "nvr-key"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# 静态资源（HTML 页面）—— Cloudflare Workers Build 会自动上传
[assets]
directory = "./public"
binding = "ASSETS"

# D1 数据库（替代 SQLite）
# 首次部署时由 scripts/bootstrap.mjs 自动创建并写入真实 ID
[[d1_databases]]
binding = "DB"
database_name = "nvr-key-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"

# KV 命名空间（替代内存 session 存储）
# 首次部署时由 scripts/bootstrap.mjs 自动创建并写入真实 ID
[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_YOUR_KV_ID"

# 环境变量（非敏感）
[vars]
SESSION_TTL_SECONDS = "7200"

# 注：管理密码不要写在这里！
# 用以下命令设置（控制台或本地均可）:
#   wrangler secret put KEYGEN_ADMIN_PASSWORD
# 或在 Dashboard → Settings → Variables and Secrets 中添加
