name = "nvr-key"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# 静态资源（HTML 页面）
[assets]
directory = "./public"
binding = "ASSETS"

# D1 数据库（替代 SQLite）
# 部署前先创建: wrangler d1 create nvr-key-db
# 然后把返回的 database_id 填到下方
[[d1_databases]]
binding = "DB"
database_name = "nvr-key-db"
database_id = "REPLACE_WITH_YOUR_D1_ID"

# KV 命名空间（替代内存 session 存储）
# 部署前先创建: wrangler kv namespace create SESSIONS
# 然后把返回的 id 填到下方
[[kv_namespaces]]
binding = "SESSIONS"
id = "REPLACE_WITH_YOUR_KV_ID"

# 环境变量
[vars]
KEYGEN_ADMIN_PASSWORD = "hy8104905"
SESSION_TTL_SECONDS = "7200"

# 注：生产环境请用 `wrangler secret put KEYGEN_ADMIN_PASSWORD` 设置密码
# 不要把真实密码提交到代码仓库
