name = "nvr-key-cloudflare"
main = "src/index.ts"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# 静态资源（HTML 页面）
[assets]
directory = "./public"
binding = "ASSETS"

# D1 数据库（已通过 API 创建并初始化表结构）
[[d1_databases]]
binding = "DB"
database_name = "nvr-key-db"
database_id = "72a1ce96-5e5f-45ec-9f02-02f96fabc844"

# KV 命名空间（用于 session 存储，带 TTL 自动清理）
[[kv_namespaces]]
binding = "SESSIONS"
id = "a92b33cce36f40b88a5c876bcb60c624"

# 环境变量（非敏感）
[vars]
SESSION_TTL_SECONDS = "7200"

# 注：管理密码 KEYGEN_ADMIN_PASSWORD 通过 Cloudflare Dashboard
# 设置为 Secret，不写在此处
